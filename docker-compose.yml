services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: evalops
      POSTGRES_USER: evalops
      POSTGRES_PASSWORD: evalops123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
